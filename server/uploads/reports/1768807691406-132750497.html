
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Appointment Slip</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        padding: 40px;
      }
      .card {
        max-width: 600px;
        margin: auto;
        background: #ffffff;
        padding: 32px;
        border-radius: 12px;
        border-top: 6px solid #0a6b2f;
      }
      h2 {
        color: #0a6b2f;
        margin-bottom: 20px;
      }
      .row {
        margin-bottom: 10px;
        font-size: 14px;
      }
      .label {
        font-weight: bold;
        color: #333;
      }
      .footer {
        margin-top: 24px;
        font-size: 12px;
        color: #666;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Appointment Confirmed</h2>

      <div class="row">
        <span class="label">Doctor:</span> Dr. Hardeep Singh
      </div>

      <div class="row">
        <span class="label">Speciality:</span> Gastroenterology
      </div>

      <div class="row">
        <span class="label">Date:</span> Tuesday, 20 Jan 2026
      </div>

      <div class="row">
        <span class="label">Time:</span> 11:00 am
      </div>

      <div class="footer">
        Please arrive 10 minutes early.<br/>
        Thank you for choosing our hospital.
      </div>
    </div>
  </body>
</html>
